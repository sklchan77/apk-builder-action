name: Build Android Unified Universal APK
run-name: ${{ github.event.inputs.repository }} ${{ github.event.inputs.branchName && format('{0}', github.event.inputs.branchName) }} ${{ github.event.inputs.subdir && format('[/{0}]', github.event.inputs.subdir) }}

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Git repository URL"
        required: true
        default: "https://github.com/AndreyPavlenko/Fermata"
      branchName:
        description: "Git branch name [Optional]"
        required: false
        default: ""
      subdir:
        description: "Relative subdirectory path when the project is nested [Optional]"
        required: false
        default: ""
      jdkVersion:
        description: "OpenJDK version: 8, 17, 21, 25, …"
        required: false
        default: "17"
      appIdSuffix:
        description: "Custom App ID Suffix (e.g., .mycustomextension)"
        required: false
        default: ".my.permata.auto.personal.build"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ github.event.inputs.jdkVersion }}

      - name: Clone project
        run: |
          if [[ -z "${{ github.event.inputs.branchName }}" ]]; then
            git clone --recurse-submodules --depth=1 ${{ github.event.inputs.repository }} workspace
          else
            git clone --recurse-submodules --depth=1 --branch ${{ github.event.inputs.branchName }} ${{ github.event.inputs.repository }} workspace
          fi

      - name: Compile Unified Multi-Module Project
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [ ! -f "gradlew" ]; then gradle wrapper; fi
          chmod +x gradlew
          # Compiles and packs all modular engines and processor assets into a single core output
          ./gradlew packageAutoReleaseUniversalApk -PAPP_ID_SFX=${{ github.event.inputs.appIdSuffix }} --stacktrace

      - name: Isolate Standalone Installer File
        run: |
          mkdir -p single_output_package
          
          # Locates and extracts exactly the one master composite release .apk file
          find workspace/ -name "*universal*.apk" -exec cp {} single_output_package/permata-fused-universal-release.apk \;
          
          echo "Verifying isolated file output:"
          ls -la single_output_package/

      - name: Upload Master APK Installer
        uses: actions/upload-artifact@v4
        with:
          name: permata-single-universal-installer
          # Target only the individual isolated binary to prevent nesting folders inside the download
          path: single_output_package/permata-fused-universal-release.apk
          retention-days: 1