name: Build Android 64-bit APK
run-name: ${{ github.event.inputs.repository }} ${{ github.event.inputs.branchName && format('{0}', github.event.inputs.branchName) }} ${{ github.event.inputs.subdir && format('[/{0}]', github.event.inputs.subdir) }}

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Git repository URL"
        required: true
        default: "https://github.com/AndreyPavlenko/Fermata"
      branchName:
        description: "Git branch name [Optional]"
        required: false
        default: ""
      subdir:
        description: "Relative subdirectory path when the project is nested [Optional]"
        required: false
        default: ""
      jdkVersion:
        description: "OpenJDK version: 8, 17, 21, 25, …"
        required: false
        default: "17"
      appIdSuffix:
        description: "Custom App ID Suffix (e.g., .mycustomextension)"
        required: false
        default: ".my.permata.auto.personal.build"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ github.event.inputs.jdkVersion }}

      - name: Clone project
        run: |
          if [[ -z "${{ github.event.inputs.branchName }}" ]]; then
            git clone --recurse-submodules --depth=1 ${{ github.event.inputs.repository }} workspace
          else
            git clone --recurse-submodules --depth=1 --branch ${{ github.event.inputs.branchName }} ${{ github.event.inputs.repository }} workspace
          fi

      - name: Build Android APK
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [ ! -f "gradlew" ]; then gradle wrapper; fi
          chmod +x gradlew
          ./gradlew assembleAutoRelease -PAPP_ID_SFX=${{ github.event.inputs.appIdSuffix }} --stacktrace

      - name: Decode and Sign 64-bit APK Natively
        run: |
          # 1. Determine correct target directories
          TARGET_DIR="${{ github.event.inputs.subdir != '' && format('workspace/{0}/fermata/build/outputs/apk/autoRelease', github.event.inputs.subdir) || 'workspace/fermata/build/outputs/apk/autoRelease' }}"
          
          # 2. Re-create the .p12 binary key out of your secret string
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.p12
          
          # 3. Locate apksigner utility inside the runner environment
          BUILD_TOOLS_DIR=$(dirname $(find /usr/local/lib/android/sdk/build-tools -name apksigner | sort -V | tail -n 1))
          
          # 4. Filter the specific 64-bit unsigned build target
          UNSIGNED_APK=$(find $TARGET_DIR -name "*arm64-v8a*.apk" ! -name "*signed*")
          
          # 5. Sign the file natively with apksigner using the P12 container
          $BUILD_TOOLS_DIR/apksigner sign --ks release.p12 --ks-type PKCS12 --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" --ks-key-alias "${{ secrets.KEY_ALIAS }}", --key-pass pass:"${{ secrets.KEY_PASSWORD }}" --out $TARGET_DIR/fermata-arm64-signed.apk $UNSIGNED_APK

      - name: Upload Single 64-bit APK
        uses: actions/upload-artifact@v4
        with:
          name: fermata-arm64-installer
          path: ${{ github.event.inputs.subdir != '' && format('workspace/{0}/fermata/build/outputs/apk/autoRelease/fermata-arm64-signed.apk', github.event.inputs.subdir) || 'workspace/fermata/build/outputs/apk/autoRelease/fermata-arm64-signed.apk' }}
          retention-days: 1