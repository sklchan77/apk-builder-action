name: Build Android SAI Bundle (.apks)
run-name: ${{ github.event.inputs.repository }} ${{ github.event.inputs.branchName && format('{0}', github.event.inputs.branchName) }} ${{ github.event.inputs.subdir && format('[/{0}]', github.event.inputs.subdir) }}

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Git repository URL"
        required: true
        default: "https://github.com/AndreyPavlenko/Fermata"
      branchName:
        description: "Git branch name [Optional]"
        required: false
        default: ""
      subdir:
        description: "Relative subdirectory path when the project is nested [Optional]"
        required: false
        default: ""
      jdkVersion:
        description: "OpenJDK version: 8, 17, 21, 25, …"
        required: false
        default: "17"
      appIdSuffix:
        description: "Custom App ID Suffix (e.g., .mycustomextension)"
        required: false
        default: ".my.permata.auto.personal.build"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ github.event.inputs.jdkVersion }}

      - name: Clone project
        run: |
          if [[ -z "${{ github.event.inputs.branchName }}" ]]; then
            git clone --recurse-submodules --depth=1 ${{ github.event.inputs.repository }} workspace
          else
            git clone --recurse-submodules --depth=1 --branch ${{ github.event.inputs.branchName }} ${{ github.event.inputs.repository }} workspace
          fi

      - name: Build All Android Modules
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [ ! -f "gradlew" ]; then gradle wrapper; fi
          chmod +x gradlew
          ./gradlew assembleAutoRelease -PAPP_ID_SFX=${{ github.event.inputs.appIdSuffix }} --stacktrace

      - name: Compile and Bundle into SAI APKS File
        run: |
          mkdir -p sai_bundle_package
          
          # 1. Broadly search and harvest all compiled release .apk variants from all module directories
          find workspace/ -name "*.apk" ! -name "*unsigned*" ! -name "*unaligned*" -exec cp {} sai_bundle_package/ \;
          
          # 2. Run an inventory safety check to ensure files were successfully copied
          FILE_COUNT=$(ls -1 sai_bundle_package/*.apk 2>/dev/null | wc -l)
          echo "Total APK variants gathered: $FILE_COUNT"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "Error: Target files were not generated in the workspace outputs!"
            exit 1
          fi
          
          # 3. Zip the gathered APK components into a single multi-module package archive
          cd sai_bundle_package
          zip -r fermata-full-modules.apks ./*.apk
          
          echo "SAI package archive content verification:"
          ls -la

      - name: Upload Signed APKS Bundle
        uses: actions/upload-artifact@v4
        with:
          name: fermata-sai-bundle
          path: sai_bundle_package/fermata-full-modules.apks
          retention-days: 1